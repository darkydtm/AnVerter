name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Unit tests run in parallel with the APK builds - pure JVM, fast.
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        run: gradle testDebugUnitTest --build-cache --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore

  # Debug and release APKs build concurrently via the matrix.
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [ Debug, Release ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Prepare release signing
        if: matrix.variant == 'Release'
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            # keystore.properties is a Java Properties file: backslash is an escape
            # char, so double any backslash to survive Properties.load() unmangled.
            esc() { printf '%s' "$1" | sed 's/\\/\\\\/g'; }
            {
              echo "storeFile=$RUNNER_TEMP/release.jks"
              echo "storePassword=$(esc "$KEYSTORE_PASSWORD")"
              echo "keyAlias=$(esc "$KEY_ALIAS")"
              echo "keyPassword=$(esc "$KEY_PASSWORD")"
            } > keystore.properties
            echo "Release keystore configured."
          else
            echo "No release keystore secret - release will be signed with the debug key."
          fi

      - name: Assemble ${{ matrix.variant }} APK
        run: gradle assemble${{ matrix.variant }} --build-cache --stacktrace

      - name: Upload ${{ matrix.variant }} APK
        uses: actions/upload-artifact@v4
        with:
          name: anverter-${{ matrix.variant }}
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
